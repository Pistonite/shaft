[package]
name = "shaft-corelib"
version = "0.0.0"
edition = "2024"
publish = false
rust-version = "1.93"

[dependencies]
cu = { workspace = true, features = [
    "process", "json", "derive", "prompt", "toml-preserve-order", "parse-impl"
] }
shaftim-build = { path = "../shaftim-build", default-features = false }
enumset.workspace = true
boa_engine.workspace = true
fs2.workspace = true
fxhash.workspace = true
reqwest = { workspace = true, features = ["blocking", "gzip"] }
serde.workspace = true
sha2.workspace = true
shell-words.workspace = true
sysinfo.workspace = true
tokio.workspace = true
flate2.workspace = true

[target.'cfg(windows)'.dependencies]
win-envedit.path = "../win-envedit"
windows = { workspace = true , features = [
    "Win32_Foundation",
    "Win32_Security",
    "Win32_System_SystemInformation",
    "Win32_System_Threading",
]}

[target.'cfg(unix)'.dependencies]
libc.workspace = true

[features]
build-x64 = []
