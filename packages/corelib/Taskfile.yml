version: '3'

includes:
  cargo:
    taskfile: ../mono-dev/task/cargo.yaml
    internal: true
    optional: true

tasks:
  check:
    - task: cargo:clippy-all
    - task: check-rustfmt
    - task: cargo:fmt-check
  check-rustfmt:
    - rustfmt --check -l $(find src -name '*.rs') --edition 2024
  fix:
    - rustfmt $(find src -name '*.rs') --edition 2024
    - task: cargo:fmt-fix
  test:
    - cargo test
