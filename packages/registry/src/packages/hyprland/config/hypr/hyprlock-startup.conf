source = ~/.config/hypr/hyprlock-share.conf 

background {
    monitor =
    path = ~/.config/hypr/paper-startup.png
    color = rgb(000000)
    blur_passes = 1
    blur_size = 2
}

animations {
    # enable fade in which distracts user from the potential waybar flicker
    # animation = fadeIn, 0
    # disable fade out since we are switching wallpaper at the same time
    # which already has a fade
    animation = fadeOut, 0
}
