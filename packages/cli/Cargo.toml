[package]
name = "shaft-cli"
version = "0.3.21"
edition = "2024"
publish = false
repository = "https://github.com/Pistonite/shaft"

[dependencies]
cu = { workspace = true, features = [
    "cli",
    "prompt",
    "fs",
    "derive",
    "json",
    "toml",
] }
corelib = { package = "shaft-corelib", path = "../corelib" }
registry = { package = "shaft-registry", path = "../registry" }
serde.workspace = true
enumset.workspace = true
enum-map.workspace = true
shutil-viopen.path = "../shutil-viopen"
itertools.workspace = true

[target.'cfg(windows)'.dependencies]
winreg.workspace = true

[[bin]]
name = "shaft"
path = "src/main.rs"

[features]
build-x64 = ["corelib/build-x64"]

[package.metadata.binstall.signing]
algorithm = "minisign"
pubkey = "RWThJQKJaXayoZBe0YV5LV4KFkQwcqQ6Fg9dJBz18JnpHGdf/cHUyKs+"

